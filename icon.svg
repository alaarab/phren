<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Copper/amber center glow — warm, like embers -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5C840"/>
      <stop offset="45%" stop-color="#D4892E"/>
      <stop offset="100%" stop-color="#8B4A12"/>
    </radialGradient>

    <!-- Ambient warmth from center -->
    <radialGradient id="ambientGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4762A" stop-opacity="0.12"/>
      <stop offset="65%" stop-color="#C4762A" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#C4762A" stop-opacity="0"/>
    </radialGradient>

    <!-- Indigo edge gradient — deep ai blue -->
    <linearGradient id="edgeGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2B5F8E" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1C3D5E" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="edgeGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E4A6E" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#162E45" stop-opacity="0.15"/>
    </linearGradient>

    <!-- Node fill — indigo -->
    <radialGradient id="nodeGrad">
      <stop offset="0%" stop-color="#3A7BAE"/>
      <stop offset="100%" stop-color="#1C4A6E"/>
    </radialGradient>

    <!-- Outer ring — very subtle -->
    <linearGradient id="ringGrad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2B5F8E" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#1C3D5E" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2B5F8E" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Background — near-black, slight warmth -->
  <circle cx="64" cy="64" r="62" fill="#0A0B09"/>
  <circle cx="64" cy="64" r="62" stroke="url(#ringGrad)" stroke-width="1"/>

  <!-- Ambient glow -->
  <circle cx="64" cy="64" r="48" fill="url(#ambientGlow)"/>

  <!-- === CONNECTIONS === -->

  <!-- Outer C arc -->
  <line x1="72" y1="22" x2="46" y2="26" stroke="url(#edgeGrad1)" stroke-width="1.2"/>
  <line x1="46" y1="26" x2="26" y2="42" stroke="url(#edgeGrad1)" stroke-width="1.2"/>
  <line x1="26" y1="42" x2="22" y2="64" stroke="url(#edgeGrad1)" stroke-width="1.2"/>
  <line x1="22" y1="64" x2="26" y2="86" stroke="url(#edgeGrad1)" stroke-width="1.2"/>
  <line x1="26" y1="86" x2="46" y2="102" stroke="url(#edgeGrad1)" stroke-width="1.2"/>
  <line x1="46" y1="102" x2="72" y2="106" stroke="url(#edgeGrad1)" stroke-width="1.2"/>

  <!-- Inner C arc -->
  <line x1="62" y1="34" x2="44" y2="38" stroke="url(#edgeGrad2)" stroke-width="0.8"/>
  <line x1="44" y1="38" x2="34" y2="50" stroke="url(#edgeGrad2)" stroke-width="0.8"/>
  <line x1="34" y1="50" x2="32" y2="64" stroke="url(#edgeGrad2)" stroke-width="0.8"/>
  <line x1="32" y1="64" x2="34" y2="78" stroke="url(#edgeGrad2)" stroke-width="0.8"/>
  <line x1="34" y1="78" x2="44" y2="90" stroke="url(#edgeGrad2)" stroke-width="0.8"/>
  <line x1="44" y1="90" x2="62" y2="94" stroke="url(#edgeGrad2)" stroke-width="0.8"/>

  <!-- Cross connections -->
  <line x1="72" y1="22" x2="62" y2="34" stroke="#1C3D5E" stroke-width="0.6" stroke-opacity="0.35"/>
  <line x1="46" y1="26" x2="44" y2="38" stroke="#1C3D5E" stroke-width="0.6" stroke-opacity="0.35"/>
  <line x1="26" y1="42" x2="34" y2="50" stroke="#1C3D5E" stroke-width="0.6" stroke-opacity="0.35"/>
  <line x1="22" y1="64" x2="32" y2="64" stroke="#1C3D5E" stroke-width="0.6" stroke-opacity="0.35"/>
  <line x1="26" y1="86" x2="34" y2="78" stroke="#1C3D5E" stroke-width="0.6" stroke-opacity="0.35"/>
  <line x1="46" y1="102" x2="44" y2="90" stroke="#1C3D5E" stroke-width="0.6" stroke-opacity="0.35"/>
  <line x1="72" y1="106" x2="62" y2="94" stroke="#1C3D5E" stroke-width="0.6" stroke-opacity="0.35"/>

  <!-- Connections to center — warm copper spokes -->
  <line x1="62" y1="34" x2="64" y2="64" stroke="#8B5A1A" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="44" y1="38" x2="64" y2="64" stroke="#8B5A1A" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="34" y1="50" x2="64" y2="64" stroke="#8B5A1A" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="32" y1="64" x2="64" y2="64" stroke="#8B5A1A" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="34" y1="78" x2="64" y2="64" stroke="#8B5A1A" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="44" y1="90" x2="64" y2="64" stroke="#8B5A1A" stroke-width="0.7" stroke-opacity="0.3"/>
  <line x1="62" y1="94" x2="64" y2="64" stroke="#8B5A1A" stroke-width="0.7" stroke-opacity="0.3"/>

  <!-- Peripheral scatter -->
  <circle cx="88" cy="30" r="1.5" fill="#2B5F8E" opacity="0.22"/>
  <circle cx="96" cy="48" r="1" fill="#2B5F8E" opacity="0.14"/>
  <circle cx="98" cy="68" r="1.2" fill="#2B5F8E" opacity="0.16"/>
  <circle cx="92" cy="88" r="1.5" fill="#2B5F8E" opacity="0.20"/>
  <circle cx="84" cy="100" r="1" fill="#2B5F8E" opacity="0.12"/>

  <!-- Faint peripheral connections -->
  <line x1="72" y1="22" x2="88" y2="30" stroke="#1C3D5E" stroke-width="0.4" stroke-opacity="0.12"/>
  <line x1="72" y1="106" x2="92" y2="88" stroke="#1C3D5E" stroke-width="0.4" stroke-opacity="0.10"/>

  <!-- === NODES === -->

  <!-- Outer C arc — indigo -->
  <circle cx="72" cy="22" r="3.5" fill="url(#nodeGrad)"/>
  <circle cx="46" cy="26" r="3" fill="url(#nodeGrad)"/>
  <circle cx="26" cy="42" r="3" fill="url(#nodeGrad)"/>
  <circle cx="22" cy="64" r="3.5" fill="url(#nodeGrad)"/>
  <circle cx="26" cy="86" r="3" fill="url(#nodeGrad)"/>
  <circle cx="46" cy="102" r="3" fill="url(#nodeGrad)"/>
  <circle cx="72" cy="106" r="3.5" fill="url(#nodeGrad)"/>

  <!-- Inner arc — darker indigo -->
  <circle cx="62" cy="34" r="2.2" fill="#1E4A6E" opacity="0.8"/>
  <circle cx="44" cy="38" r="2" fill="#1E4A6E" opacity="0.7"/>
  <circle cx="34" cy="50" r="2" fill="#1E4A6E" opacity="0.7"/>
  <circle cx="32" cy="64" r="2.2" fill="#1E4A6E" opacity="0.8"/>
  <circle cx="34" cy="78" r="2" fill="#1E4A6E" opacity="0.7"/>
  <circle cx="44" cy="90" r="2" fill="#1E4A6E" opacity="0.7"/>
  <circle cx="62" cy="94" r="2.2" fill="#1E4A6E" opacity="0.8"/>

  <!-- Center — copper ember -->
  <circle cx="64" cy="64" r="10" fill="#8B4A12" opacity="0.10"/>
  <circle cx="64" cy="64" r="6.5" fill="url(#centerGlow)"/>
  <circle cx="64" cy="64" r="3" fill="#FDE89A" opacity="0.5"/>
</svg>
