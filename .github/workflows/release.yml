name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version to publish (must match packages/cli/package.json)
        required: true
        type: string

jobs:
  verify-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"

      - name: Ensure version matches packages/cli/package.json
        run: |
          PKG_VERSION=$(node -p "require('./packages/cli/package.json').version")
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ "$PKG_VERSION" != "$INPUT_VERSION" ]; then
            echo "Version mismatch: packages/cli/package.json=$PKG_VERSION, input=$INPUT_VERSION"
            exit 1
          fi

      - name: Ensure changelog contains this version
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          grep -q "^## \[$INPUT_VERSION\]" CHANGELOG.md || {
            echo "CHANGELOG.md missing header for $INPUT_VERSION"
            exit 1
          }

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test -- --coverage

      - name: Validate docs
        run: pnpm run validate-docs

      - name: Publish package
        working-directory: packages/cli
        run: npm publish --access public --provenance

      - name: Create git tag
        run: |
          VERSION="${{ github.event.inputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}
          git push origin "v$VERSION"
