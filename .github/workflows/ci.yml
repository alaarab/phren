name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Strict unused checks
        run: npx tsc -p mcp/tsconfig.json --noUnusedLocals --noUnusedParameters

      - name: Test
        run: npm test

      - name: Package smoke check
        run: npm pack --dry-run
