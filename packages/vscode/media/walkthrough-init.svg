<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300" fill="none">
  <style>
    .outline { stroke: var(--vscode-foreground, #cccccc); fill: none; }
    .text-fill { fill: var(--vscode-foreground, #cccccc); }
    .purple-fill { fill: #5D43F3; }
    .purple-light-fill { fill: #9B8EF8; }
    .cyan-fill { fill: #28D3F2; }
    .purple-stroke { stroke: #5D43F3; fill: none; }
    .cyan-stroke { stroke: #28D3F2; fill: none; }
  </style>

  <!-- Database/cylinder shape -->
  <ellipse cx="200" cy="100" rx="60" ry="18" class="outline" stroke-width="2.5" />
  <path d="M140 100 L140 180" class="outline" stroke-width="2.5" />
  <path d="M260 100 L260 180" class="outline" stroke-width="2.5" />
  <ellipse cx="200" cy="180" rx="60" ry="18" class="outline" stroke-width="2.5" />

  <!-- Middle ellipse line for rows -->
  <ellipse cx="200" cy="140" rx="60" ry="18" class="outline" stroke-width="1.5" opacity="0.4" />

  <!-- Purple fill on top ellipse -->
  <ellipse cx="200" cy="100" rx="55" ry="14" class="purple-fill" opacity="0.15" />

  <!-- Sparkle/star top-right -->
  <g transform="translate(275, 75)">
    <line x1="0" y1="-14" x2="0" y2="14" class="cyan-stroke" stroke-width="2.5" stroke-linecap="round" />
    <line x1="-14" y1="0" x2="14" y2="0" class="cyan-stroke" stroke-width="2.5" stroke-linecap="round" />
    <line x1="-9" y1="-9" x2="9" y2="9" class="cyan-stroke" stroke-width="2" stroke-linecap="round" />
    <line x1="9" y1="-9" x2="-9" y2="9" class="cyan-stroke" stroke-width="2" stroke-linecap="round" />
  </g>

  <!-- Smaller sparkle top-left -->
  <g transform="translate(118, 90)">
    <line x1="0" y1="-8" x2="0" y2="8" class="purple-stroke" stroke-width="2" stroke-linecap="round" opacity="0.6" />
    <line x1="-8" y1="0" x2="8" y2="0" class="purple-stroke" stroke-width="2" stroke-linecap="round" opacity="0.6" />
  </g>

  <!-- Small sparkle bottom-right -->
  <g transform="translate(290, 155)">
    <line x1="0" y1="-6" x2="0" y2="6" class="purple-stroke" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />
    <line x1="-6" y1="0" x2="6" y2="0" class="purple-stroke" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />
  </g>

  <!-- Data rows inside cylinder -->
  <line x1="170" y1="125" x2="210" y2="125" class="purple-stroke" stroke-width="2" stroke-linecap="round" opacity="0.7" />
  <line x1="215" y1="125" x2="230" y2="125" class="cyan-stroke" stroke-width="2" stroke-linecap="round" opacity="0.7" />
  <line x1="170" y1="145" x2="195" y2="145" class="purple-stroke" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  <line x1="200" y1="145" x2="230" y2="145" class="cyan-stroke" stroke-width="2" stroke-linecap="round" opacity="0.5" />
  <line x1="170" y1="165" x2="220" y2="165" class="purple-stroke" stroke-width="2" stroke-linecap="round" opacity="0.3" />

  <!-- Label -->
  <text x="200" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" class="text-fill">Initialize Memory Store</text>
  <text x="200" y="257" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" class="text-fill" opacity="0.6">Create your ~/.phren directory</text>
</svg>