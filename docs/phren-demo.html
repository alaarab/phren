/* BFS path along edges */
function bfsPath(fromIdx, toIdx) {
  const visited = new Set([fromIdx]);
  const queue = [[fromIdx]];
  while (queue.length) {
    const path = queue.shift();
    const cur = path[path.length - 1];
    if (cur === toIdx) return path;
    for (const [a, b] of edges) {
      const next = a === cur ? b : b === cur ? a : -1;
      if (next >= 0 && !visited.has(next)) {
        visited.add(next);
        queue.push([...path, next]);
      }
    }
  }
  return null;
}

/* Auto-walk schedule */
const walkOrder = [1, 6, 3, 10, 5, 11, 4, 7, 9, 2, 8, 0];
let walkIdx = 0;
let walkTimer = 0;
const WALK_DELAY = 80;

function startWalkTo(nodeIdx) {
  let closestIdx = 0, closestDist = Infinity;
  for (let i = 0; i < nodes.length; i++) {
    const dx = nodes[i].x - phren.x, dy = nodes[i].y - phren.y;
    const d = dx*dx + dy*dy;
    if (d < closestDist) { closestDist = d; closestIdx = i; }
  }
  const path = bfsPath(closestIdx, nodeIdx);
  if (path && path.length > 1) {
    phren.waypoints = path.slice(1).map(i => ({ x: nodes[i].x, y: nodes[i].y, idx: i }));
    phren._pathNodes = path;
  } else {
    phren.waypoints = [{ x: nodes[nodeIdx].x, y: nodes[nodeIdx].y, idx: nodeIdx }];
    phren._pathNodes = [closestIdx, nodeIdx];
  }
  phren.wpIdx = 0;
  phren.targetX = phren.waypoints[0].x;
  phren.targetY = phren.waypoints[0].y;
  phren.state = 'moving';
  phren.stateT = 0;
  phren.arrivedNode = -1;

  if (phren._pathNodes.length > 1) {
    phren.currentEdge = { from: phren._pathNodes[0], to: phren._pathNodes[1] };
    activeEdges.push({ ...phren.currentEdge, age: 0 });
  }
}

/* ── Drawing helpers ────────────────────────────────────────── */

function drawBackground() {
  ctx.fillStyle = 'rgba(232,228,217,0.015)';
  for (let x = 40; x < W; x += 40) {
    for (let y = 40; y < H; y += 40) {
      ctx.beginPath();
      ctx.arc(x, y, 0.8, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawEdge(a, b) {
  const na = nodes[a], nb = nodes[b];
  let edgeGlow = 0;
  for (const ae of activeEdges) {
    if ((ae.from === a && ae.to === b) || (ae.from === b && ae.to === a)) {
      edgeGlow = Math.max(0, 1 - ae.age / 60);
    }
  }
  ctx.beginPath();
  ctx.moveTo(na.x, na.y);
  ctx.lineTo(nb.x, nb.y);
  if (edgeGlow > 0) {
    const grad = ctx.createLinearGradient(na.x, na.y, nb.x, nb.y);
    grad.addColorStop(0, `rgba(123,104,174,${edgeGlow * 0.4})`);
    grad.addColorStop(0.5, `rgba(155,138,200,${edgeGlow * 0.5})`);
    grad.addColorStop(1, `rgba(123,104,174,${edgeGlow * 0.4})`);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 1.5 + edgeGlow;
    ctx.shadowColor = 'rgba(123,104,174,0.3)';
    ctx.shadowBlur = edgeGlow * 8;
  } else {
    ctx.strokeStyle = 'rgba(91,75,138,0.12)';
    ctx.lineWidth = 0.8;
    ctx.shadowBlur = 0;
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawNode(n, highlight, idx) {
  const isArrived = idx === phren.arrivedNode;
  const arrivalPulse = isArrived ? Math.max(0, 1 - phren.arrivedT / 50) : 0;
  const glowR = n.r * 2.2 + arrivalPulse * 8;
  const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, glowR);
  g.addColorStop(0, n.color + (highlight ? '50' : '25'));
  g.addColorStop(1, n.color + '00');
  ctx.beginPath();
  ctx.arc(n.x, n.y, glowR, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
  const bg = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
  if (highlight || isArrived) {
    bg.addColorStop(0, '#9B8AC8');
    bg.addColorStop(1, '#5B4B8A');
  } else {
    bg.addColorStop(0, n.color);
    bg.addColorStop(1, n.color + '88');
  }
  ctx.fillStyle = bg;
  ctx.fill();

  if (highlight || isArrived) {
    ctx.strokeStyle = `rgba(0,229,255,${highlight ? 0.8 : arrivalPulse * 0.6})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  ctx.fillStyle = highlight ? '#00E5FF' : '#e8e4d9';
  ctx.globalAlpha = highlight ? 1 : 0.7;
  ctx.font = `${n.r > 16 ? 11 : 10}px Inter, system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText(n.label, n.x, n.y + n.r + 15);
  ctx.globalAlpha = 1;

  if (n.type === 'project') {
    ctx.fillStyle = 'rgba(123,104,174,0.4)';
    ctx.font = '8px Inter, system-ui, sans-serif';
    ctx.fillText('project', n.x, n.y + n.r + 25);
  }
}

function drawPhren() {
  const { x, y, state, pulsePhase } = phren;
  const isFlash = state === 'flash';
  const isMoving = state === 'moving';

  /* Trail — purple tinted */
  for (let i = 0; i < phren.trail.length; i++) {
    const t = phren.trail[i];
    const life = 1 - t.age / 45;
    const alpha = Math.max(0, life * life * 0.35);
    const r = 5 * life;
    if (alpha > 0 && r > 0) {
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      const tg = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, r);
      tg.addColorStop(0, `rgba(155,138,200,${alpha})`);
      tg.addColorStop(1, `rgba(123,104,174,${alpha * 0.3})`);
      ctx.fillStyle = tg;
      ctx.fill();
    }
  }

  /* Ambient glow — purple (behind sprite) */
  const glowPulse = 22 + Math.sin(pulsePhase) * 5;
  const glowAlpha = isFlash ? 0.5 : (isMoving ? 0.2 : 0.12 + Math.sin(pulsePhase) * 0.04);
  const glow = ctx.createRadialGradient(x, y, 0, x, y, glowPulse);
  glow.addColorStop(0, `rgba(123,104,174,${glowAlpha})`);
  glow.addColorStop(0.4, `rgba(91,75,138,${glowAlpha * 0.5})`);
  glow.addColorStop(1, 'rgba(91,75,138,0)');
  ctx.beginPath();
  ctx.arc(x, y, glowPulse, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  /* Sprite rendering */
  if (phrenImgReady) {
    ctx.save();
    /* fixed 48px size, scale up to 56px on arrival flash */
    let spriteSize = 48;
    if (isFlash && phren.stateT < 10) {
      spriteSize = 48 + 8 * (1 - phren.stateT / 10);
    }
    /* bob up/down 2-3px when moving */
    const bobOffset = isMoving ? Math.sin(pulsePhase * 8) * 2.5 : 0;
    /* crisp pixel art */
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(phrenImg, x - spriteSize / 2, y - spriteSize / 2 + bobOffset, spriteSize, spriteSize);
    /* arrival flash: cyan glow ring */
    if (isFlash && phren.stateT < 12) {
      const ringAlpha = 0.6 * (1 - phren.stateT / 12);
      ctx.beginPath();
      ctx.arc(x, y + bobOffset, spriteSize * 0.55, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(0,229,255,${ringAlpha})`;
      ctx.lineWidth = 2;
      ctx.shadowColor = `rgba(0,229,255,${ringAlpha * 0.5})`;
      ctx.shadowBlur = 8;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    ctx.restore();
  }
}

function drawTooltip() {
  if (tooltip.alpha < 0.01) return;
  ctx.save();
  ctx.globalAlpha = tooltip.alpha;
  ctx.font = '10px Inter, system-ui, sans-serif';
  ctx.textAlign = 'center';
  const tw = ctx.measureText(tooltip.text).width + 16;
  const th = 20;
  const tx = tooltip.x - tw / 2;
  const ty = tooltip.y - th / 2;
  ctx.fillStyle = 'rgba(21,22,15,0.85)';
  ctx.beginPath();
  ctx.roundRect(tx, ty, tw, th, 10);
  ctx.fill();
  ctx.strokeStyle = 'rgba(123,104,174,0.3)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  ctx.fillStyle = '#7B68AE';
  ctx.fillText(tooltip.text, tooltip.x, tooltip.y + 4);
  ctx.restore();
}

function drawHUD() {
  ctx.fillStyle = '#e8e4d980';
  ctx.font = '500 13px Inter, system-ui, sans-serif';
  ctx.textAlign = 'left';
  ctx.letterSpacing = '0.04em';
  ctx.fillText('phren', 24, 32);
  ctx.letterSpacing = '0';
  ctx.fillStyle = '#6b686040';
  ctx.font = '10px Inter, system-ui, sans-serif';
  ctx.fillText('fragment graph', 24, 46);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#6b686050';
  ctx.font = '10px Inter, system-ui, sans-serif';
  ctx.fillText(`${nodes.length} fragments`, W - 24, 32);
  const legend = [
    { color: '#7B68AE', label: 'project' },
    { color: '#3a7bae', label: 'fragment' },
    { color: '#6b8e7a', label: 'reference' },
    { color: '#b8860b', label: 'task' },
  ];
  const ly = H - 20;
  ctx.textAlign = 'left';
  ctx.font = '9px Inter, system-ui, sans-serif';
  let lx = 24;
  for (const l of legend) {
    ctx.fillStyle = l.color + '80';
    ctx.beginPath();
    ctx.arc(lx, ly, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#6b686060';
    ctx.fillText(l.label, lx + 8, ly + 3);
    lx += ctx.measureText(l.label).width + 24;
  }
}

/* ── Update loop ────────────────────────────────────────────── */
let frame = 0;

function update() {
  frame++;
  phren.pulsePhase += 0.04;

  for (const t of phren.trail) t.age++;
  phren.trail = phren.trail.filter(t => t.age < 45);

  for (const ae of activeEdges) ae.age++;
  while (activeEdges.length > 0 && activeEdges[0].age > 60) activeEdges.shift();

  if (phren.arrivedNode >= 0) {
    phren.arrivedT++;
    if (phren.arrivedT > 60) phren.arrivedNode = -1;
  }

  tooltip.alpha += (tooltip.targetAlpha - tooltip.alpha) * 0.12;

  if (phren.state === 'idle') {
    walkTimer++;
    if (walkTimer > (walkIdx === 0 ? 40 : WALK_DELAY)) {
      startWalkTo(walkOrder[walkIdx % walkOrder.length]);
      walkIdx++;
      walkTimer = 0;
    }
  }

  if (phren.state === 'moving') {
    phren.stateT++;
    const dx = phren.targetX - phren.x;
    const dy = phren.targetY - phren.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (phren.stateT % 2 === 0) {
      phren.trail.push({ x: phren.x, y: phren.y, age: 0 });
    }

    if (dist < 2) {
      phren.x = phren.targetX;
      phren.y = phren.targetY;
      phren.wpIdx++;
      if (phren.wpIdx < phren.waypoints.length) {
        const fromNode = phren._pathNodes[phren.wpIdx];
        const toNode = phren._pathNodes[phren.wpIdx + 1];
        if (fromNode !== undefined && toNode !== undefined) {
          activeEdges.push({ from: fromNode, to: toNode, age: 0 });
        }
        phren.targetX = phren.waypoints[phren.wpIdx].x;
        phren.targetY = phren.waypoints[phren.wpIdx].y;
        phren.stateT = 0;
      } else {
        phren.state = 'flash';
        phren.stateT = 0;
        const lastWp = phren.waypoints[phren.waypoints.length - 1];
        if (lastWp) {
          phren.arrivedNode = lastWp.idx;
          phren.arrivedT = 0;
          tooltip.text = 'phren remembered this';
          tooltip.x = lastWp.x;
          tooltip.y = lastWp.y - nodes[lastWp.idx].r - 18;
          tooltip.targetAlpha = 1;
          setTimeout(() => { tooltip.targetAlpha = 0; }, 1800);
        }
      }
    } else {
      const t = Math.min(phren.stateT / 30, 1);
      const ease = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
      const speed = Math.min(dist * 0.06 + ease * 2, 4.5);
      phren.x += (dx / dist) * speed;
      phren.y += (dy / dist) * speed;
    }
  }

  if (phren.state === 'flash') {
    phren.stateT++;
    if (phren.stateT > 18) {
      phren.state = 'idle';
      phren.stateT = 0;
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawHUD();
  for (const [a, b] of edges) drawEdge(a, b);

  let highlightIdx = -1;
  if (phren.state === 'flash' || phren.state === 'idle') {
    for (let i = 0; i < nodes.length; i++) {
      const dx = nodes[i].x - phren.x, dy = nodes[i].y - phren.y;
      if (dx*dx + dy*dy < 25) { highlightIdx = i; break; }
    }
  }

  for (let i = 0; i < nodes.length; i++) drawNode(nodes[i], i === highlightIdx, i);
  drawPhren();
  drawTooltip();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
