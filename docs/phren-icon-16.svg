<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">
  <!-- Simplified 16x16 favicon - recognizable silhouette -->
  <!-- Dark background -->
  <rect width="16" height="16" rx="3" fill="#12122a"/>
  <!-- Brain body outline -->
  <g fill="#2D2255">
    <rect x="5" y="2" width="6" height="1"/>
    <rect x="3" y="3" width="2" height="1"/>
    <rect x="11" y="3" width="2" height="1"/>
    <rect x="2" y="4" width="1" height="5"/>
    <rect x="13" y="4" width="1" height="5"/>
    <rect x="3" y="9" width="2" height="1"/>
    <rect x="11" y="9" width="2" height="1"/>
    <rect x="5" y="10" width="6" height="1"/>
  </g>
  <!-- Body fill -->
  <g fill="#7B68AE">
    <rect x="5" y="3" width="6" height="1"/>
    <rect x="3" y="4" width="10" height="5"/>
    <rect x="5" y="9" width="6" height="1"/>
  </g>
  <!-- Brain wrinkle -->
  <g fill="#5B4B8A">
    <rect x="5" y="4" width="1" height="1"/>
    <rect x="7" y="4" width="1" height="1"/>
    <rect x="9" y="4" width="1" height="1"/>
    <rect x="4" y="5" width="1" height="1"/>
    <rect x="8" y="5" width="1" height="1"/>
    <rect x="11" y="5" width="1" height="1"/>
  </g>
  <!-- Highlight -->
  <g fill="#9B8DC8">
    <rect x="6" y="3" width="2" height="1"/>
    <rect x="6" y="4" width="1" height="1"/>
    <rect x="10" y="4" width="1" height="1"/>
  </g>
  <!-- Eyes -->
  <g fill="#2D2255">
    <rect x="5" y="6" width="2" height="2"/>
    <rect x="9" y="6" width="2" height="2"/>
  </g>
  <!-- Eye shine -->
  <g fill="#FFFFFF">
    <rect x="5" y="6" width="1" height="1"/>
    <rect x="9" y="6" width="1" height="1"/>
  </g>
  <!-- Legs -->
  <g fill="#3D3270">
    <rect x="5" y="10" width="2" height="2"/>
    <rect x="9" y="10" width="2" height="2"/>
  </g>
  <!-- Sparkle -->
  <g fill="#00E5FF">
    <rect x="12" y="1" width="1" height="1"/>
    <rect x="11" y="2" width="1" height="1"/>
    <rect x="12" y="2" width="1" height="1"/>
    <rect x="13" y="2" width="1" height="1"/>
    <rect x="12" y="3" width="1" height="1"/>
  </g>
</svg>