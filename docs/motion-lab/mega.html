<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Phren — Story Loop</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #0a0a1a;
  --fg: #ece9f5;
  --muted: rgba(236,233,245,0.55);
  --accent: #7C3AED;
  --cyan: #28D3F2;
  --mono: "JetBrains Mono", ui-monospace, monospace;
  --sans: "Space Grotesk", system-ui, sans-serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: #181826; color: var(--fg); font-family: var(--sans); }
body { min-height: 100vh; display: grid; place-items: center; padding: 40px 20px; }

.wrap { display: flex; flex-direction: column; gap: 18px; align-items: center; }

.title-bar { display: flex; align-items: baseline; gap: 14px; max-width: 800px; width: 100%; }
.title-bar .eyebrow { font-family: var(--mono); font-size: 10px; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; }
.title-bar .meta { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--muted); }

#stage {
  width: 800px;
  height: 450px;
  background: var(--bg);
  border-radius: 6px;
  overflow: hidden;
  position: relative;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(156,143,248,0.12);
}

.controls {
  display: flex; gap: 10px; align-items: center;
  font-family: var(--mono); font-size: 11px; color: var(--muted);
}
.controls button {
  background: rgba(124,58,237,0.15);
  border: 1px solid rgba(156,143,248,0.3);
  color: var(--fg);
  font-family: var(--mono); font-size: 11px;
  padding: 8px 14px; border-radius: 3px; cursor: pointer;
  letter-spacing: 1px; text-transform: uppercase;
  transition: all 0.15s;
}
.controls button:hover { background: rgba(124,58,237,0.3); border-color: var(--accent); }
.controls button:disabled { opacity: 0.5; cursor: wait; }
.controls .progress { width: 200px; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
.controls .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.1s linear; }
.controls .pip {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: var(--cyan); margin-right: 6px;
  animation: blink 1.2s ease-in-out infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div class="wrap">
  <div class="title-bar" style="width: 800px;">
    <span class="eyebrow">Phren · Story Loop</span>
    <span class="meta">800×450 · 18s loop</span>
  </div>

  <div id="stage"></div>

  <div class="controls">
    <span><span class="pip"></span>Live preview</span>
    <span style="margin-left: 12px;">Beat: <strong id="beat-name" style="color:var(--fg)">…</strong></span>
    <div class="progress" style="margin-left: 12px;"><div id="progress-bar" class="progress-bar"></div></div>
    <button id="restart-btn" style="margin-left:auto;">Restart</button>
  </div>
  <div style="font-family: var(--mono); font-size: 10px; color: var(--muted); max-width: 800px; text-align: center;">
    To export as GIF: screen-record this stage with QuickTime / Loom / your tool of choice during one full loop.
  </div>
</div>

<script>
window.TWEAKS = { theme: "dark", speed: 1, scale: 1 };
</script>

<script src="vendor/react.development.js"></script>
<script src="vendor/react-dom.development.js"></script>
<script src="vendor/babel.min.js"></script>
<script src="sprite-data.js"></script>
<script type="text/babel" src="sprite.jsx"></script>
<script type="text/babel" src="story.jsx"></script>

</body>
</html>
