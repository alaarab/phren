<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 112" width="96" height="112">
  <style>
    @keyframes walk {
      0%, 100% { visibility: visible; }
      50%, 99.9% { visibility: hidden; }
    }
    @keyframes walk-alt {
      0%, 49.9% { visibility: hidden; }
      50%, 100% { visibility: visible; }
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
    @keyframes sparkle-walk {
      0%, 100% { opacity: 1; }
      25% { opacity: 0.5; }
      50% { opacity: 1; }
      75% { opacity: 0.3; }
    }
    .legs-a { animation: walk 0.6s steps(1) infinite; }
    .legs-b { animation: walk-alt 0.6s steps(1) infinite; }
    .body { animation: bob 0.6s ease-in-out infinite; }
    .sparkle { animation: sparkle-walk 0.6s ease-in-out infinite; transform-origin: 82px 10px; }
  </style>
