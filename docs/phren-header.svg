<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" width="20" height="20">
  <!-- Minimal inline header: just face + sparkle, 20px -->
  <!-- Brain head -->
  <g fill="#2D2255">
    <rect x="5" y="1" width="7" height="1"/>
    <rect x="3" y="2" width="2" height="1"/>
    <rect x="12" y="2" width="2" height="1"/>
    <rect x="2" y="3" width="1" height="6"/>
    <rect x="14" y="3" width="1" height="6"/>
    <rect x="3" y="9" width="2" height="1"/>
    <rect x="12" y="9" width="2" height="1"/>
    <rect x="5" y="10" width="7" height="1"/>
  </g>
  <!-- Body fill -->
  <g fill="#7B68AE">
    <rect x="5" y="2" width="7" height="1"/>
    <rect x="3" y="3" width="11" height="6"/>
    <rect x="5" y="9" width="7" height="1"/>
  </g>
  <!-- Brain wrinkles -->
  <g fill="#5B4B8A">
    <rect x="5" y="3" width="1" height="1"/>
    <rect x="7" y="3" width="1" height="1"/>
    <rect x="9" y="3" width="1" height="1"/>
    <rect x="11" y="3" width="1" height="1"/>
    <rect x="4" y="4" width="1" height="1"/>
    <rect x="6" y="4" width="1" height="1"/>
    <rect x="10" y="4" width="1" height="1"/>
    <rect x="12" y="4" width="1" height="1"/>
  </g>
  <!-- Highlights -->
  <g fill="#9B8DC8">
    <rect x="6" y="2" width="3" height="1"/>
    <rect x="8" y="3" width="1" height="1"/>
    <rect x="7" y="4" width="1" height="1"/>
    <rect x="9" y="4" width="1" height="1"/>
  </g>
  <!-- Eyes -->
  <g fill="#2D2255">
    <rect x="5" y="6" width="2" height="2"/>
    <rect x="10" y="6" width="2" height="2"/>
  </g>
  <g fill="#FFFFFF">
    <rect x="5" y="6" width="1" height="1"/>
    <rect x="10" y="6" width="1" height="1"/>
  </g>
  <!-- Smile -->
  <g fill="#3D3270">
    <rect x="7" y="8" width="1" height="1"/>
    <rect x="9" y="8" width="1" height="1"/>
  </g>
  <!-- Sparkle -->
  <g fill="#00E5FF">
    <rect x="16" y="1" width="1" height="1"/>
    <rect x="15" y="2" width="1" height="1"/>
    <rect x="16" y="2" width="1" height="1"/>
    <rect x="17" y="2" width="1" height="1"/>
    <rect x="16" y="3" width="1" height="1"/>
  </g>
  <g fill="#4DFFFF">
    <rect x="16" y="0" width="1" height="1"/>
    <rect x="14" y="2" width="1" height="1"/>
    <rect x="18" y="2" width="1" height="1"/>
    <rect x="16" y="4" width="1" height="1"/>
  </g>
  <!-- Tiny legs hint -->
  <g fill="#3D3270">
    <rect x="5" y="10" width="2" height="2"/>
    <rect x="10" y="10" width="2" height="2"/>
  </g>
</svg>